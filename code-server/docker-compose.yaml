---
services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-Etc/UTC}
      - PASSWORD=${PASSWORD:-}
      - HASHED_PASSWORD=${HASHED_PASSWORD:-}
      - SUDO_PASSWORD=${SUDO_PASSWORD:-}
      - SUDO_PASSWORD_HASH=${SUDO_PASSWORD_HASH:-}
      - PROXY_DOMAIN=${PROXY_DOMAIN:-}
      - DEFAULT_WORKSPACE=${DEFAULT_WORKSPACE:-/workspaces}
    volumes:
      # Shared code-server config (settings, extensions, user data)
      - ../config:/config
      # Mount the entire parent directory so every sibling folder is accessible
      # inside the container under /workspaces.
      # e.g.  ../elasticstacks  →  /workspaces/elasticstacks
      #        ../fotos-ops-api  →  /workspaces/fotos-ops-api
      - ..:/workspaces
    ports:
      - ${PORT:-8443}:8443
    restart: unless-stopped
